name: CI-komikku

on:
  push:
    branches:
      - master
  # Manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI_CHUNK_SIZE: 65

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    outputs:
      individualMatrix: ${{ steps.generate-matrices.outputs.individualMatrix }}
    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4


      - name: Get number of modules
        run: |
          set -x
          projects=(src/*/*)

          echo "NUM_INDIVIDUAL_MODULES=${#projects[@]}" >> $GITHUB_ENV

      - id: generate-matrices
        name: Create output matrices
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const numIndividualModules = process.env.NUM_INDIVIDUAL_MODULES;
            const chunkSize = process.env.CI_CHUNK_SIZE;

            const numIndividualChunks = Math.ceil(numIndividualModules / chunkSize);

            console.log(`Individual modules: ${numIndividualModules} (${numIndividualChunks} chunks of ${chunkSize})`);

            core.setOutput('individualMatrix', { 'chunk': [...Array(numIndividualChunks).keys()] });

  build_individual:
    name: Build individual modules
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.individualMatrix) }}
    steps:
      - name: Checkout ${{ github.ref_name }} branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up JDK
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4
        with:
          java-version: 17
          distribution: temurin


      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0bdd871935719febd78681f197cd39af5b6e16a6 # v4
        with:
          cache-read-only: ${{ matrix.chunk != 0 }}

      - name: Build extensions (chunk ${{ matrix.chunk }})
        env:
          CI_CHUNK_NUM: ${{ matrix.chunk }}
          ALIAS: "komikku"
          KEY_STORE_PASSWORD: "komikku123"
          KEY_PASSWORD: "komikku123"
        run: ./gradlew -p src assembleRelease

      - name: Upload APKs (chunk ${{ matrix.chunk }})
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4
        with:
          name: "individual-apks-${{ matrix.chunk }}"
          path: "**/*.apk"
          retention-days: 1


  publish_repo:
    name: Publish repo
    needs:
      - build_individual
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@7a6d8a8234af8eb26422e24e3006232cccaa061b # v4
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout master branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: master
          path: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Signing Key
        run: |
          if [ ! -f master/signingkey.jks ]; then
            keytool -genkey -v -keystore master/signingkey.jks -alias komikku -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=komikku" -storepass komikku123 -keypass komikku123
            cd master
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"
            git add signingkey.jks
            git commit -m "Add permanent signing key [skip ci]"
            git push origin master
          fi

      - name: Extract Fingerprint
        run: |
          mkdir -p repo
          # Extract from the first APK found in artifacts that looks like Mangago
          APK_PATH=$(find ~/apk-artifacts -name "*mangago*.apk" | head -n 1)
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            python master/check_sig_v4.py "$APK_PATH" | grep "SHA-256 Fingerprint:" | cut -d ' ' -f 3 > repo/fingerprint.txt
            echo "Extracted Fingerprint from APK: $(cat repo/fingerprint.txt)"
          else
            echo "Mangago APK not found at $APK_PATH, falling back to JKS extraction"
            keytool -list -v -keystore master/signingkey.jks -alias komikku -storepass komikku123 | grep "SHA256:" | cut -d ' ' -f 3 | tr -d ':' | tr '[:upper:]' '[:lower:]' > repo/fingerprint.txt
          fi

      - name: Checkout repo branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          ref: repo
          path: repo

      - name: Create repo artifacts
        run: |
          mkdir -p repo/icon
          mkdir -p repo/apk
          cp master/src/en/mangago/res/mipmap-xxhdpi/ic_launcher.png repo/icon/eu.kanade.tachiyomi.extension.en.mangago.png
          cp master/.github/scripts/move-apks.py repo/.github/scripts/move-apks.py
          cp master/.github/scripts/update-index.py repo/.github/scripts/update-index.py
          # fingerprint.txt is already in repo/
          cd repo
          python ./.github/scripts/move-apks.py
          python ./.github/scripts/update-index.py

      - name: Commit and push changes
        run: |
          cd repo
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Update extensions repo [skip ci]" || echo "No changes to commit"
          git push origin repo
